# ============================================================
# Ambiente LOCAL de desenvolvimento (não é o de produção).
# Sobe app + MySQL + phpMyAdmin e já carrega schema.sql + seed.sql.
# Uso:  docker compose up -d --build
# App:  http://localhost:8080/     phpMyAdmin: http://localhost:8081/
# No EasyPanel, crie os serviços pela interface (ver docs/13).
# ============================================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roh_e_sih_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_AMBIENTE: desenvolvimento
      DB_HOST: db
      DB_PORT: "3306"
      DB_NOME: roh_e_sih
      DB_USUARIO: roh_app
      DB_SENHA: troque_esta_senha
    depends_on:
      db:
        condition: service_healthy
    networks: [interna]

  db:
    image: mysql:8.4
    container_name: roh_e_sih_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: roh_e_sih
      MYSQL_USER: roh_app
      MYSQL_PASSWORD: troque_esta_senha
      MYSQL_ROOT_PASSWORD: troque_a_root
    volumes:
      - db_dados:/var/lib/mysql
      # schema.sql roda antes de seed.sql (ordem alfabética)
      - ./sistema/database:/docker-entrypoint-initdb.d:ro
    networks: [interna]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:5
    container_name: roh_e_sih_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    depends_on: [db]
    networks: [interna]

networks:
  interna:

volumes:
  db_dados:
